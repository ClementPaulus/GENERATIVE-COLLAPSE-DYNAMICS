{% set name = "umcp" %}
{% set version = "2.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - umcp = umcp.cli:main
    - umcp-ext = umcp.umcp_extensions:main
    - umcp-api = umcp.api_umcp:main
    - umcp-dashboard = umcp.dashboard:main
    - umcp-calc = umcp.universal_calculator:main
    - umcp-finance = umcp.finance_cli:main

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.11
    - pyyaml >=6.0.1
    - jsonschema >=4.23.0
    - numpy >=1.24.0
    - scipy >=1.10.0

test:
  imports:
    - umcp
    - umcp.cli
    - umcp.validator
    - umcp.kernel_optimized
    - umcp.seam_optimized
    - umcp.frozen_contract
    - umcp.measurement_engine
    - closures
  commands:
    - umcp --help
    - umcp-calc --help
    - python -c "from umcp import validate, MeasurementEngine, __version__; assert __version__ == '{{ version }}'"
  requires:
    - pytest >=8.0.0

about:
  home: https://github.com/calebpruett927/GENERATIVE-COLLAPSE-DYNAMICS
  summary: >-
    Universal Measurement Contract Protocol — contract-first validation
    framework with GCD kernel. 20 domains, 174 closures, 8397 tests.
  description: |
    UMCP validates reproducible computational workflows against mathematical
    contracts. The unit of work is a casepack — a directory containing raw
    data, a contract reference, closures, and expected outputs. The validator
    checks schema conformance, Tier-1 kernel identities (F + ω = 1,
    IC ≤ F, IC = exp(κ)), regime classification, and SHA-256 integrity,
    producing a three-valued CONFORMANT / NONCONFORMANT / NON_EVALUABLE
    verdict.

    Core Axiom: "Collapse is generative; only what returns is real."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/calebpruett927/GENERATIVE-COLLAPSE-DYNAMICS/blob/main/README.md
  dev_url: https://github.com/calebpruett927/GENERATIVE-COLLAPSE-DYNAMICS

extra:
  recipe-maintainers:
    - calebpruett927
